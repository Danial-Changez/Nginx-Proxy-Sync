services:
  npm:
    container_name: npm
    image: jc21/nginx-proxy-manager:latest
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - proxy-net
    restart: unless-stopped

  nginx-proxy-sync:
    container_name: nginx-proxy-sync
    build: .
    env_file: .env
    environment:
      NPM_URL: http://npm:81
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data
    networks:
      - proxy-net
    depends_on:
      - npm
    restart: unless-stopped

  # Example app - auto-proxied as whoami.<NPM_DOMAIN>
  whoami:
    container_name: whoami
    image: traefik/whoami
    networks:
      - proxy-net
    labels:
      npm.enable: "true"
    restart: unless-stopped

volumes:
  npm-data:
  npm-letsencrypt:

networks:
  proxy-net:
    driver: bridge
